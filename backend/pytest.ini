[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts = -v --tb=short -p no:cacheprovider
markers =
    live: tests that hit real network services (skipped by default; run with --runslow)
    slow: tests that take more than 1 second
    django_db: mark test as requiring database access (provided by Django's TestCase)
filterwarnings =
    ignore::DeprecationWarning
